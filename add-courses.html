<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add course</title>
        <link rel="stylesheet" href="css/style.css">

</head>
<body>
    <header>
        <h1>Add course</h1>
    </header>
    <nav>
       <a href="index.html">Home</a>
       <a href="courses.html">My Courses</a>
       <a href="add-courses.html" class="active">Add Course</a>
       <a href="contact.html">Contact Us</a>
    </nav>

    <main>
        <section class="card">
            <form>
                <label for="course-name">Course Name</label>
                <input id="course-name" type="text" required placeholder="Course name...">

                <label for="instructor">Instructor</label>
                <input id="instructor" type="text" required placeholder="Your name...">

                <label for="credit-hours">Credit Hours</label>
                <input id="credit-hours" type="number" required placeholder="Enter number...">

                <label for="notes">Notes</label>
                <textarea id="notes" maxlength="400"></textarea>

                <button type="submit">Submit</button>
            </form>

        </section>
    </main>
    <footer>
        <p>2026</p>
    </footer>
</body>
</html>
